<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Luyện Tập Toán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        /* Tối ưu hóa vùng chứa như một App trên điện thoại 9:16 */
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #ffffff; box-shadow: 0 0 40px rgba(0,0,0,0.05); position: relative; overflow-x: hidden; }
        .glass-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 50; }
        .input-mobile { width: 100%; padding: 1rem 1.25rem; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 15px; font-weight: 600; outline: none; transition: all 0.2s; }
        .input-mobile:focus { border-color: #0D9488; background: #fff; }
        .btn-primary { width: 100%; padding: 1.1rem; background: #1e293b; color: white; border-radius: 16px; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(30,41,59,0.15); }
        .btn-primary:active { transform: scale(0.98); }
        .folder-card { background: #fff; border: 2px solid #f1f5f9; border-radius: 20px; padding: 1.5rem; text-align: center; transition: all 0.2s; cursor: pointer; }
        .folder-card:active { border-color: #0D9488; background: #f0fdfa; transform: scale(0.97); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDvdEgUXxWvC78Q0xkehC99xMQ-oZGzlus",
            authDomain: "th-my-91ed8.firebaseapp.com",
            projectId: "th-my-91ed8",
            storageBucket: "th-my-91ed8.firebasestorage.app",
            messagingSenderId: "629306856660",
            appId: "1:629306856660:web:4018efbdbd65ad9aed5741"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className="" }) => {
            const ref = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={`inline-block ${className}`}><i data-lucide={name} style={{width:size, height:size}}></i></span>;
        };

        const getOrCreateDeviceId = () => {
            let id = localStorage.getItem('thmy_device_id');
            if (!id) { id = 'dev_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('thmy_device_id', id); } 
            return id;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [studentInfo, setStudentInfo] = useState({name:'', class:''});
            const [loading, setLoading] = useState(false);
            
            useEffect(() => {
                const saved = localStorage.getItem('thmy_student');
                if (saved) { 
                    setStudentInfo(JSON.parse(saved)); 
                    setView('home'); 
                }
            }, []);

            const doLogin = async () => {
                if(!studentInfo.name || !studentInfo.class) { alert("Vui lòng nhập đủ thông tin!"); return; }
                setLoading(true);
                try {
                    const name = studentInfo.name.trim();
                    const cls = studentInfo.class.toUpperCase().trim();
                    const studentId = btoa(unescape(encodeURIComponent(name.toLowerCase() + "_" + cls)));
                    const doc = await db.collection("students").doc(studentId).get();
                    
                    if (doc.exists) {
                        const data = doc.data();
                        const deviceId = getOrCreateDeviceId();
                        if (data.devices.includes(deviceId) || data.devices.length < data.maxDevices) {
                            if (!data.devices.includes(deviceId)) {
                                await db.collection("students").doc(studentId).update({ devices: [...data.devices, deviceId] });
                            }
                            const info = {name, class: cls};
                            setStudentInfo(info); localStorage.setItem('thmy_student', JSON.stringify(info));
                            setView('home');
                        } else alert("Tài khoản đã đạt giới hạn số thiết bị đăng nhập!");
                    } else alert("Không tìm thấy học sinh trong lớp này. Hãy báo Thầy/Cô kiểm tra lại!");
                } catch(e) {
                    console.error(e);
                    alert("Lỗi kết nối mạng, vui lòng thử lại!");
                }
                setLoading(false);
            };

            if (view === 'login') return (
                <div className="app-container flex flex-col justify-center px-6">
                    <div className="text-center mb-10">
                        <div className="w-20 h-20 bg-teal-500 rounded-[1.8rem] mx-auto mb-6 flex items-center justify-center text-white shadow-xl shadow-teal-500/30">
                            <Icon name="graduation-cap" size={40}/>
                        </div>
                        <h1 className="text-2xl font-black uppercase tracking-tight text-slate-800">Hệ Thống Luyện Tập</h1>
                        <p className="text-sm font-semibold text-teal-600 mt-2">Vui lòng định danh để tiếp tục</p>
                    </div>
                    <div className="space-y-4 mb-8">
                        <input type="text" placeholder="Họ và tên của bạn..." value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo, name:e.target.value})} className="input-mobile" />
                        <input type="text" placeholder="Lớp (Ví dụ: 10A1)..." value={studentInfo.class} onChange={e=>setStudentInfo({...studentInfo, class:e.target.value})} className="input-mobile uppercase" />
                    </div>
                    <button onClick={doLogin} disabled={loading} className="btn-primary flex justify-center items-center gap-2">
                        {loading ? <Icon name="loader" className="animate-spin"/> : 'Bắt đầu ngay'}
                    </button>
                </div>
            );

            if (view === 'home') return (
                <div className="app-container bg-slate-50 min-h-screen pb-10">
                    <header className="glass-header p-5 flex justify-between items-center">
                        <div>
                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Xin chào,</p>
                            <h2 className="text-lg font-black text-slate-800">{studentInfo.name}</h2>
                        </div>
                        <div className="w-10 h-10 bg-teal-100 text-teal-700 rounded-full flex items-center justify-center font-black text-sm border-2 border-white shadow-sm">
                            {studentInfo.class}
                        </div>
                    </header>
                    
                    <div className="p-5">
                        <h3 className="font-black text-sm uppercase text-slate-500 mb-4 flex items-center gap-2"><Icon name="layers" size={16}/> Chọn Khối Học</h3>
                        <div className="grid grid-cols-2 gap-4">
                            {[ {id:'toan_10', n:'Toán 10', c:'text-blue-500'}, {id:'toan_11', n:'Toán 11', c:'text-indigo-500'}, {id:'toan_12', n:'Toán 12', c:'text-teal-500'}, {id:'thqg', n:'Ôn Thi THQG', c:'text-rose-500'} ].map(cat => (
                                <div key={cat.id} className="folder-card">
                                    <div className={`w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-3 ${cat.c}`}>
                                        <Icon name="book-open" size={24} />
                                    </div>
                                    <span className="font-bold text-sm text-slate-700">{cat.n}</span>
                                </div>
                            ))}
                        </div>

                        <div className="mt-12 text-center">
                            <button onClick={()=>{localStorage.removeItem('thmy_student'); setView('login');}} className="text-xs font-bold text-rose-500 bg-rose-50 px-6 py-3 rounded-full inline-flex items-center gap-2">
                                <Icon name="log-out" size={14}/> Đăng xuất thiết bị
                            </button>
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
