<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống luyện tập Toán - Onl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; background-image: linear-gradient(135deg, #f0fdf4 0%, #F8F9FA 50%, #f0f9ff 100%); color: #1e293b; }
        .card-light { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .card-light:hover:not(.card-disabled) { border-color: #0D9488; transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(13, 148, 136, 0.15), 0 10px 10px -5px rgba(13, 148, 136, 0.04); }
        .card-disabled { opacity: 0.6; filter: grayscale(50%); cursor: not-allowed; background-color: #fef2f2; border-color: #fecaca; }
        .bubble-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #cbd5e1; color: #64748b; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 13px; background: #f8fafc; cursor: pointer;}
        .bubble-btn:hover { border-color: #0D9488; color: #0D9488; }
        .bubble-selected { background: #0D9488; color: white !important; border-color: #0D9488; box-shadow: 0 4px 10px rgba(13, 148, 136, 0.3);}
        .tf-btn { width: 38px; height: 32px; border-radius: 10px; border: 2px solid #cbd5e1; color: #64748b; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 13px; background: #f8fafc; cursor: pointer;}
        .tf-btn:hover { border-color: #0D9488; color: #0D9488; }
        .tf-selected-D { background: #0D9488; color: white !important; border-color: #0D9488; box-shadow: 0 4px 10px rgba(13, 148, 136, 0.3);}
        .tf-selected-S { background: #DC2626; color: white !important; border-color: #DC2626; box-shadow: 0 4px 10px rgba(220, 38, 38, 0.3);}
        .latex-content { font-size: 16px; line-height: 1.6; color: #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // CẤU HÌNH ĐỊA CHỈ BACKEND
        const API_URL = "https://th-trmy.x10.mx/api.php";
        const BASE_URL = "https://th-trmy.x10.mx/";

        const Icon = ({ name, size = 20, className="" }) => {
            const ref = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={`inline-block ${className}`}><i data-lucide={name} style={{width:size, height:size}}></i></span>;
        };

        const getOrCreateDeviceId = () => {
            let id = localStorage.getItem('thmy_device_id');
            if (!id) { id = 'dev_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('thmy_device_id', id); } return id;
        };

        const ResultView = ({ attempt, exam, fullData, onBack }) => {
            useEffect(() => { if (window.MathJax) window.MathJax.typeset(); }, []);
            
            const isAllowed = fullData?.showAnswers || false; 

            const renderPartSolutions = (partKey, title) => {
                const count = exam?.config?.[partKey] || 0; if (count === 0) return null;
                return (
                    <div className="space-y-4 mb-10"><h4 className="font-black text-blue-900 text-lg uppercase tracking-widest border-b-2 border-blue-100 pb-2 flex items-center gap-2"><Icon name="check-square" size={20}/> {title}</h4>
                        {Array.from({length: count}, (_, i) => i + 1).map(n => {
                            let isCorrect = false; let userA = attempt?.userAnswers?.[partKey]?.[n]; let trueA = fullData?.correctAnswers?.[partKey]?.[n];
                            if (partKey === 'p2') isCorrect = true; else if (partKey === 'p3' || partKey === 'p4') isCorrect = userA?.toString().trim().toLowerCase() === trueA?.toString().trim().toLowerCase(); else isCorrect = userA === trueA;
                            const sol = fullData?.detailedSolutions?.[partKey]?.[n];
                            return (
                                <div key={`${partKey}_${n}`} className={`bg-white rounded-2xl border-2 transition-all shadow-sm ${isCorrect?'border-teal-200':'border-red-200'}`}>
                                    <div className="p-5 flex items-center justify-between border-b border-gray-100 bg-gray-50/50 rounded-t-2xl">
                                        <span className="font-black text-blue-900 text-sm uppercase">Câu {n}</span>
                                        {partKey === 'p2' ? <span className="text-xs font-bold text-gray-500 bg-white px-3 py-1 rounded-lg border border-gray-200">Xem giải bên dưới</span> : <span className={`text-xs font-black px-4 py-1.5 rounded-xl shadow-sm ${isCorrect?'bg-teal-100 text-teal-700':'bg-red-100 text-red-700'}`}>{isCorrect ? 'CHÍNH XÁC' : `SAI (Đ/A CHUẨN: ${trueA || 'Chưa có'})`}</span>}
                                    </div>
                                    {sol && <div className="p-6 bg-white rounded-b-2xl"><p className="text-xs font-black text-teal-600 uppercase mb-3 flex items-center gap-1"><Icon name="book-open" size={16}/> Lời giải chi tiết:</p><div className="latex-content text-gray-800">{sol}</div></div>}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <header className="bg-white border-b border-gray-200 p-6 flex justify-between items-center shrink-0 shadow-sm z-10 relative">
                        <div className="flex items-center gap-5">
                            <div className="w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-red-200">{attempt?.score || 0}</div>
                            <div><h2 className="font-black text-blue-900 text-xl uppercase leading-none">{attempt?.name}</h2><p className="text-xs font-bold text-teal-600 mt-2 uppercase tracking-widest bg-teal-50 px-3 py-1 rounded-lg inline-block border border-teal-100">{attempt?.class} • Hoàn thành</p></div>
                        </div>
                        <button onClick={onBack} className="bg-blue-900 text-white px-6 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-blue-800 shadow-lg shadow-blue-200 transition-all flex items-center gap-2 hover:-translate-x-1"><Icon name="home" size={20}/> Trang chủ</button>
                    </header>
                    <main className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar">
                        <div className="max-w-4xl mx-auto space-y-8">
                            {!isAllowed ? (
                                <div className="bg-white p-12 rounded-[2.5rem] border border-red-100 text-center mt-10 shadow-2xl"><Icon name="lock" size={64} className="text-red-600 mx-auto mb-6" /><h3 className="text-2xl font-black text-blue-900 uppercase">Giải chi tiết đang khóa</h3><p className="text-gray-600 text-lg mt-4 font-semibold">Bài làm của bạn đã được ghi nhận. Hệ thống đang khóa xem lại đáp án theo thiết lập của giáo viên.</p></div>
                            ) : <div className="space-y-6 pb-20 bg-white p-8 md:p-12 rounded-[2rem] shadow-xl border border-gray-100">{renderPartSolutions('p1', 'Phần I: Trắc nghiệm')}{renderPartSolutions('p2', 'Phần II: Đúng/Sai')}{renderPartSolutions('p3', 'Phần III: Trả lời ngắn')}{renderPartSolutions('p4', 'Phần IV: Tự luận')}</div>}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [studentInfo, setStudentInfo] = useState({name:'', class:''});
            const [exams, setExams] = useState([]);
            const [history, setHistory] = useState([]);
            const iframeRef = useRef(null);
            
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedSub, setSelectedSub] = useState(null);
            
            const [activeExam, setActiveExam] = useState(null);
            const [userAnswers, setUserAnswers] = useState({p1:{}, p2:{}, p3:{}, p4:{}});
            const [fullResultData, setFullResultData] = useState(null);
            const [loadingLogin, setLoadingLogin] = useState(false);
            const [zoom, setZoom] = useState(1);
            
            const [timeLeft, setTimeLeft] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [hasSubmitted, setHasSubmitted] = useState(false);

            const canAccessFolder = (cat) => {
                if (!studentInfo.class) return false; const classPrefix = studentInfo.class.substring(0, 2); 
                if (cat === 'toan_10' && classPrefix === '10') return true; if (cat === 'toan_11' && classPrefix === '11') return true;
                if ((cat === 'toan_12' || cat === 'thqg') && classPrefix === '12') return true; return false;
            };

            const fetchHistory = async (info) => {
                try {
                    const res = await fetch(`${API_URL}?action=history`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(info) });
                    setHistory(await res.json());
                } catch(e) {}
            };

            useEffect(() => {
                const savedInfo = localStorage.getItem('thmy_student');
                if (savedInfo) { const info = JSON.parse(savedInfo); setStudentInfo(info); setView('folders'); fetchHistory(info); }
                fetch(`${API_URL}?action=list`).then(r => r.json()).then(data => setExams(data)).catch(e => console.error(e));
            }, []);

            useEffect(() => { if (activeExam && activeExam.type === 'pdf') { localStorage.setItem(`thmy_draft_${activeExam.id}`, JSON.stringify(userAnswers)); } }, [userAnswers, activeExam]);

            useEffect(() => {
                if (timeLeft !== null && timeLeft > 0 && !hasSubmitted) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000); return () => clearTimeout(timer);
                } else if (timeLeft === 0 && !isSubmitting && !hasSubmitted) {
                    alert("Hết thời gian làm bài! Hệ thống tự động nộp bài."); setTimeLeft(null); triggerDualSubmit();
                }
            }, [timeLeft, isSubmitting, hasSubmitted]);

            useEffect(() => {
                if (view === 'quiz' && !hasSubmitted && !isSubmitting) {
                    const isStrict = activeExam?.strictMode !== false;
                    if (isStrict) {
                        const handleVisibilityChange = () => {
                            if (document.hidden) {
                                alert("CẢNH BÁO VI PHẠM: Phát hiện chuyển Tab/thoát màn hình làm bài. Hệ thống tự động nộp bài!");
                                triggerDualSubmit();
                            }
                        };
                        document.addEventListener('visibilitychange', handleVisibilityChange);
                        return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
                    }
                }
            }, [view, hasSubmitted, isSubmitting, activeExam]);

            const doLogin = async () => {
                if (!studentInfo.name || !studentInfo.class) { alert("Vui lòng nhập đủ Họ tên và Lớp!"); return; } setLoadingLogin(true);
                try {
                    const res = await fetch(`${API_URL}?action=verify_device`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: studentInfo.name, class: studentInfo.class, deviceId: getOrCreateDeviceId() }) });
                    const data = await res.json();
                    if (data.success) {
                        const info = {name: data.student.name, class: data.student.class}; setStudentInfo(info); localStorage.setItem('thmy_student', JSON.stringify(info)); setView('folders'); fetchHistory(info);
                    } else { alert(data.message); }
                } catch(err) { alert("Lỗi kết nối. Xin thử lại!"); } setLoadingLogin(false);
            };

            const handleLogout = () => { if(confirm("Bạn có chắc chắn muốn đăng xuất không?")) { localStorage.removeItem('thmy_student'); setStudentInfo({name:'', class:''}); setView('login'); } };

            const startExam = (exam) => {
                setActiveExam(exam); setZoom(1); setIsSubmitting(false); setHasSubmitted(false);
                if (exam.config?.timeLimit) { setTimeLeft(parseInt(exam.config.timeLimit) * 60); } else { setTimeLeft(null); }
                if (exam.type === 'pdf') { const saved = localStorage.getItem(`thmy_draft_${exam.id}`); if (saved) setUserAnswers(JSON.parse(saved)); else setUserAnswers({p1:{}, p2:{}, p3:{}, p4:{}}); } 
                else { setUserAnswers({p1:{}, p2:{}, p3:{}, p4:{}}); } setView('quiz');
            };

            const triggerDualSubmit = () => {
                if (isSubmitting) return; setIsSubmitting(true);
                if (activeExam?.type === 'html' && iframeRef.current) {
                    try {
                        const doc = iframeRef.current.contentWindow.document;
                        const btns = Array.from(doc.querySelectorAll('button, input[type="button"], a.btn'));
                        const innerBtn = btns.find(b => b.innerText.toLowerCase().includes('nộp') || b.innerText.toLowerCase().includes('kết thúc') || b.value?.toLowerCase().includes('nộp'));
                        if (innerBtn) { innerBtn.click(); setTimeout(() => submitHtmlScore(), 800); return; }
                    } catch(e) {}
                    submitHtmlScore();
                } else { submitTest(); }
            };

            const submitTest = async () => {
                try {
                    const res = await fetch(`${API_URL}?action=get_results`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ examId: activeExam.id }) });
                    const fullData = await res.json(); setFullResultData(fullData);

                    let totalScore = 0; const correct = fullData?.correctAnswers || {};
                    for(let i=1; i<=(activeExam?.config?.p1||0); i++) if (userAnswers.p1?.[i] === correct.p1?.[i]) totalScore += 0.25;
                    for(let i=1; i<=(activeExam?.config?.p2||0); i++) {
                        let subCorrect = 0; ['a','b','c','d'].forEach(sub => { if (userAnswers.p2?.[i]?.[sub] && userAnswers.p2?.[i]?.[sub] === correct.p2?.[i]?.[sub]) subCorrect++; });
                        if (subCorrect === 1) totalScore += 0.1; else if (subCorrect === 2) totalScore += 0.25; else if (subCorrect === 3) totalScore += 0.5; else if (subCorrect === 4) totalScore += 1.0;
                    }
                    for(let i=1; i<=(activeExam?.config?.p3||0); i++) { let ua = userAnswers.p3?.[i]?.toString().trim().toLowerCase(); let ta = correct.p3?.[i]?.toString().trim().toLowerCase(); if (ua && ta && ua === ta) totalScore += 0.5; }
                    for(let i=1; i<=(activeExam?.config?.p4||0); i++) { let ua = userAnswers.p4?.[i]?.toString().trim().toLowerCase(); let ta = correct.p4?.[i]?.toString().trim().toLowerCase(); if (ua && ta && ua === ta) totalScore += 0.5; }

                    const attempt = { examId: activeExam.id, name: studentInfo.name, class: studentInfo.class, score: totalScore.toFixed(2), userAnswers: userAnswers, time: Date.now() };
                    localStorage.removeItem(`thmy_draft_${activeExam.id}`);
                    
                    await fetch(`${API_URL}?action=submit_attempt`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(attempt) });
                    fetchHistory(studentInfo); 
                    setActiveExam({...activeExam, attempt}); 
                    setHasSubmitted(true); setTimeLeft(null);
                    
                    alert(`Đã nộp bài thành công!
Điểm số của bạn: ${totalScore.toFixed(2)}`); 
                    setView('result'); 
                } catch (e) { alert("Lỗi nộp bài! Kiểm tra mạng."); setIsSubmitting(false); }
            };

            const submitHtmlScore = async () => {
                const iframe = iframeRef.current; if(!iframe) return;
                try {
                    const doc = iframe.contentWindow.document; const text = doc.body.innerText;
                    const match = text.match(/(\d+[,.]?\d*)\s*\/\s*10/); let score = 0;
                    if(match) { score = parseFloat(match[1].replace(',','.')); } 
                    else { alert("Lỗi: Không tự quét được điểm. Vui lòng báo Thầy!"); setIsSubmitting(false); return; }

                    const res = await fetch(`${API_URL}?action=get_results`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ examId: activeExam.id }) });
                    const fullData = await res.json(); setFullResultData(fullData);
                    const attempt = { examId: activeExam.id, name: studentInfo.name, class: studentInfo.class, score: score.toFixed(2), time: Date.now() };
                    
                    await fetch(`${API_URL}?action=submit_attempt`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(attempt) });
                    fetchHistory(studentInfo); 
                    setActiveExam({...activeExam, attempt}); 
                    setHasSubmitted(true); setTimeLeft(null);
                    
                    if (fullData.showAnswers) { 
                        alert(`Đã nộp bài thành công!
Điểm số của bạn: ${score.toFixed(2)}
Bạn có thể tiếp tục xem lại bài đã làm.`); 
                    } else { 
                        alert(`Đã nộp bài thành công!
Điểm số của bạn: ${score.toFixed(2)}`); 
                        setView('list'); 
                    }
                } catch(e) { alert("Lỗi kết nối bài giảng. Báo Thầy Mỹ để xử lý!"); setIsSubmitting(false); }
            };

            const formatTime = (secs) => { const m = Math.floor(secs / 60); const s = secs % 60; return `${m}:${s.toString().padStart(2, '0')}`; };

            useEffect(() => {
                const handler = (e) => { if(e.data === 'trigger_parent_submit') triggerDualSubmit(); };
                window.addEventListener('message', handler); return () => window.removeEventListener('message', handler);
            });

            const handleIframeLoad = () => {
                if (iframeRef.current && activeExam && activeExam.type === 'html') {
                    try {
                        const doc = iframeRef.current.contentWindow.document;
                        const style = doc.createElement('style');
                        style.textContent = `
                            img, svg, canvas, .applet_container { 
                                pointer-events: none !important; 
                                user-select: none !important; 
                                -webkit-user-drag: none !important; 
                            }
                            button, input, a, select, textarea, .btn { 
                                pointer-events: auto !important; 
                            }
                        `;
                        doc.head.appendChild(style);

                        doc.addEventListener('click', (e) => {
                            const btn = e.target.closest('button, input[type="button"], a');
                            if (btn && (btn.innerText.toLowerCase().includes('nộp') || btn.innerText.toLowerCase().includes('kết thúc') || btn.value?.toLowerCase().includes('nộp'))) {
                                setTimeout(() => window.parent.postMessage('trigger_parent_submit', '*'), 500);
                            }
                        });
                    } catch(e) {}
                }
            };

            if (view === 'login') return (
                <div className="h-screen flex items-center justify-center p-4 relative overflow-hidden bg-blue-900">
                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-400 via-blue-900 to-black"></div>
                    <div className="bg-white p-10 md:p-14 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center z-10" onKeyDown={e => e.key === 'Enter' && doLogin()}>
                        <div className="w-24 h-24 bg-gradient-to-br from-teal-400 to-teal-600 rounded-3xl mx-auto mb-8 flex items-center justify-center text-white rotate-3 shadow-lg"><Icon name="hexagon" size={48}/></div>
                        <h2 className="font-black text-3xl uppercase mb-2 text-blue-730 tracking-tight">THPT Bùi Thị Xuân<br/>-Mũi Né </h2>
                        <p className="text-teal-600 text-sm font-bold uppercase tracking-widest mb-10">Thầy Mỹ</p>
                        <div className="space-y-4">
                            <div className="text-left"><label className="text-[10px] font-black uppercase text-gray-500 ml-2">Họ và tên học sinh</label>
                            <input type="text" placeholder="Nhập đầy đủ họ tên..." value={studentInfo.name} onChange={e=>setStudentInfo({...studentInfo, name:e.target.value})} className="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-teal-500 font-bold transition-all" /></div>
                            <div className="text-left"><label className="text-[10px] font-black uppercase text-gray-500 ml-2">Lớp học</label>
                            <input type="text" placeholder="VD: 12A1" value={studentInfo.class} onChange={e=>setStudentInfo({...studentInfo, class:e.target.value})} className="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-2xl outline-none uppercase focus:border-teal-500 font-bold transition-all" /></div>
                            <button onClick={doLogin} disabled={loadingLogin} className="w-full py-4 mt-4 bg-blue-900 hover:bg-blue-800 text-white rounded-2xl font-black uppercase tracking-widest transition-all shadow-xl shadow-blue-900/30 text-sm">{loadingLogin ? 'ĐANG KẾT NỐI...' : 'VÀO HỆ THỐNG'}</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'quiz') return (
                <div className="h-screen flex flex-col overflow-hidden bg-gray-50" onCopy={e=>e.preventDefault()} onCut={e=>e.preventDefault()} onPaste={e=>e.preventDefault()}>
                    <header className="bg-white border-b border-gray-200 p-2 md:p-3 flex justify-between items-center z-10 shrink-0 shadow-sm relative">
                        <button onClick={()=>{
                            if(hasSubmitted) {
                                setView('list'); setTimeLeft(null);
                            } else if(confirm('Thoát mà chưa nộp bài? Đáp án tạm vẫn được lưu.')) { 
                                setView('list'); setTimeLeft(null); 
                            }
                        }} className="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 hover:text-blue-900 rounded-lg transition-all border border-gray-200"><Icon name="arrow-left" size={16}/></button>
                        
                        <div className="absolute right-4 top-2 flex items-center gap-2">
                            {timeLeft !== null && !hasSubmitted && <span className="font-bold text-red-600 bg-red-50 border border-red-100 px-3 py-1.5 rounded-lg text-sm mr-2 shadow-sm flex items-center gap-1"><Icon name="timer" size={16}/> {formatTime(timeLeft)}</span>}
                            <button onClick={()=>setZoom(z => z + 0.05)} className="px-3 py-1.5 bg-gray-50 text-gray-700 rounded-lg font-bold border border-gray-200 hover:bg-blue-900 hover:text-white transition-all text-xs">A+</button>
                            <button onClick={()=>setZoom(z => z - 0.05)} className="px-3 py-1.5 bg-gray-50 text-gray-700 rounded-lg font-bold border border-gray-200 hover:bg-blue-900 hover:text-white transition-all text-xs">A-</button>
                            
                            {!hasSubmitted ? (
                                <button onClick={()=>{if(confirm('Chắc chắn NỘP BÀI ngay?')) triggerDualSubmit();}} disabled={isSubmitting} className="ml-2 bg-red-600 text-white px-6 py-1.5 rounded-lg font-black text-sm uppercase hover:bg-red-700 shadow-lg shadow-red-200/50 transition-all flex items-center gap-1">{isSubmitting ? 'ĐANG NỘP...' : 'NỘP BÀI'}</button>
                            ) : (
                                <span className="ml-2 bg-teal-100 text-teal-700 border border-teal-200 px-6 py-1.5 rounded-lg font-black text-sm uppercase flex items-center gap-1"><Icon name="check-circle" size={16}/> ĐÃ NỘP</span>
                            )}
                        </div>
                    </header>
                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                        <div className={`flex-1 border-r border-gray-200 bg-gray-100 overflow-auto ${activeExam?.type==='pdf' ? 'h-1/2 md:h-full' : 'h-full'}`}>
                            <div style={{ transform: `scale(${zoom})`, transformOrigin: 'top left', width: `${100/zoom}%`, height: `${100/zoom}%` }}>
                                <iframe ref={iframeRef} onLoad={handleIframeLoad} src={activeExam ? BASE_URL + activeExam.filePath : ''} className="w-full h-full bg-white border-0 shadow-inner" title="Exam View"></iframe>
                            </div>
                        </div>
                        
                        {activeExam?.type === 'pdf' && (
                            <div className="w-full md:w-[380px] bg-white overflow-y-auto p-6 md:p-8 custom-scrollbar h-1/2 md:h-full">
                                <div className="sticky top-0 bg-white/95 backdrop-blur pb-4 mb-6 border-b border-gray-100 z-10">
                                    <h3 className="font-black text-center text-gray-800 uppercase text-sm tracking-widest flex items-center justify-center gap-2"><Icon name="edit-3" size={18} className="text-teal-600"/> Phiếu trả lời</h3>
                                </div>
                                <div className="space-y-10">
                                    {(activeExam?.config?.p1 || 0) > 0 && (
                                        <div><h4 className="text-xs font-black text-teal-600 uppercase mb-4 bg-teal-50 p-2.5 rounded-xl text-center border border-teal-100">I. Trắc nghiệm</h4>
                                            <div className="space-y-3">{Array.from({length: activeExam.config.p1}, (_, i) => i + 1).map(n => (
                                                <div key={n} className="flex items-center justify-between py-2 border-b border-gray-50">
                                                    <span className="text-sm font-bold text-gray-500 w-8">Câu {n}</span>
                                                    <div className="flex gap-2">{['A','B','C','D'].map(c => <button key={c} onClick={()=>{if(!hasSubmitted) setUserAnswers({...userAnswers, p1:{...userAnswers.p1, [n]:c}})}} className={`bubble-btn ${userAnswers.p1?.[n]===c?'bubble-selected':''}`}>{c}</button>)}</div>
                                                </div>
                                            ))}</div>
                                        </div>
                                    )}
                                    {(activeExam?.config?.p2 || 0) > 0 && (
                                        <div><h4 className="text-xs font-black text-orange-500 uppercase mb-4 bg-orange-50 p-2.5 rounded-xl text-center border border-orange-100">II. Đúng / Sai</h4>
                                            <div className="space-y-5">{Array.from({length: activeExam.config.p2}, (_, i) => i + 1).map(n => (
                                                <div key={n} className="bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-sm"><span className="text-sm font-black text-gray-800 block mb-3 border-b border-gray-200 pb-2">Câu {n}</span>
                                                    <div className="grid grid-cols-1 gap-3">{['a','b','c','d'].map(sub => (
                                                        <div key={sub} className="flex items-center justify-between bg-white p-2.5 rounded-xl border border-gray-100 shadow-sm">
                                                            <span className="text-sm font-bold text-gray-500 ml-1">{sub})</span>
                                                            <div className="flex gap-2">
                                                                <button onClick={()=>{if(!hasSubmitted){const up2 = {...userAnswers.p2}; if(!up2[n]) up2[n] = {}; up2[n][sub] = 'D'; setUserAnswers({...userAnswers, p2: up2});}}} className={`tf-btn ${userAnswers.p2?.[n]?.[sub]==='D'?'tf-selected-D':''}`}>Đúng</button>
                                                                <button onClick={()=>{if(!hasSubmitted){const up2 = {...userAnswers.p2}; if(!up2[n]) up2[n] = {}; up2[n][sub] = 'S'; setUserAnswers({...userAnswers, p2: up2});}}} className={`tf-btn ${userAnswers.p2?.[n]?.[sub]==='S'?'tf-selected-S':''}`}>Sai</button>
                                                            </div>
                                                        </div>
                                                    ))}</div>
                                                </div>
                                            ))}</div>
                                        </div>
                                    )}
                                    {(activeExam?.config?.p3 || 0) > 0 && (
                                        <div><h4 className="text-xs font-black text-blue-900 uppercase mb-4 bg-blue-50 p-2.5 rounded-xl text-center border border-blue-100">III. Trả lời ngắn</h4>
                                            <div className="space-y-3">{Array.from({length: activeExam.config.p3}, (_, i) => i + 1).map(n => (
                                                <div key={n} className="flex items-center gap-4 bg-gray-50 p-2 rounded-xl border border-gray-100"><span className="text-sm font-bold text-gray-500 w-12 text-center">Câu {n}</span><input type="text" value={userAnswers.p3?.[n] || ''} placeholder="Nhập đáp số..." disabled={hasSubmitted} onChange={e=>setUserAnswers({...userAnswers, p3:{...userAnswers.p3, [n]:e.target.value}})} className="flex-1 bg-white border border-gray-300 p-3 rounded-lg text-sm text-gray-800 font-bold outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm"/></div>
                                            ))}</div>
                                        </div>
                                    )}
                                    {(activeExam?.config?.p4 || 0) > 0 && (
                                        <div><h4 className="text-xs font-black text-yellow-600 uppercase mb-4 bg-yellow-50 p-2.5 rounded-xl text-center border border-yellow-200">IV. Tự luận</h4>
                                            <div className="space-y-3">{Array.from({length: activeExam.config.p4}, (_, i) => i + 1).map(n => (
                                                <div key={n} className="flex items-center gap-4 bg-gray-50 p-2 rounded-xl border border-gray-100"><span className="text-sm font-bold text-gray-500 w-12 text-center">Câu {n}</span><input type="text" value={userAnswers.p4?.[n] || ''} placeholder="Nhập đáp số..." disabled={hasSubmitted} onChange={e=>setUserAnswers({...userAnswers, p4:{...userAnswers.p4, [n]:e.target.value}})} className="flex-1 bg-white border border-gray-300 p-3 rounded-lg text-sm text-gray-800 font-bold outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-100 transition-all shadow-sm"/></div>
                                            ))}</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderHeader = (title, onBack = null) => (
                <header className="mb-8 p-6 md:p-8 rounded-[2rem] shadow-sm bg-white border border-gray-200">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-900 border border-blue-100"><Icon name="target" size={32}/></div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-black text-blue-900 tracking-tight">{title}</h1>
                                <p className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-1">Trường THPT Bùi Thị Xuân - Mũi Né</p>
                            </div>
                        </div>
                        <div className="text-center md:text-right flex items-center gap-5 bg-gray-50 px-5 py-3 rounded-2xl border border-gray-200">
                            <div><p className="font-black text-sm text-gray-700">{studentInfo.name}</p><p className="text-[10px] text-teal-600 font-black uppercase tracking-widest mt-0.5">{studentInfo.class}</p></div>
                            <div className="w-px h-8 bg-gray-300 mx-1"></div>
                            <button onClick={handleLogout} className="text-gray-400 hover:text-red-600 transition-colors" title="Đăng xuất"><Icon name="log-out" size={20}/></button>
                        </div>
                    </div>
                    {onBack && <button onClick={onBack} className="mt-6 text-gray-500 hover:text-teal-600 flex items-center gap-2 text-sm font-bold uppercase transition-all bg-white px-5 py-2.5 rounded-xl border border-gray-200 hover:border-teal-200 shadow-sm w-fit"><Icon name="arrow-left" size={18}/> Quay lại danh mục</button>}
                </header>
            );

            const renderHistoryStats = () => {
                if (history.length === 0) return null;
                const bestScores = {};
                history.forEach(h => {
                    if (!bestScores[h.examId] || parseFloat(h.score) > parseFloat(bestScores[h.examId].score)) { bestScores[h.examId] = h; }
                });
                const sortedHistory = Object.values(bestScores).sort((a,b) => b.time - a.time).slice(0, 5); 

                return (
                    <div className="mt-12 bg-white rounded-[2rem] p-8 border border-gray-200 shadow-sm">
                        <h3 className="text-sm uppercase tracking-widest font-black mb-6 text-gray-600 border-l-4 border-orange-500 pl-4 flex items-center gap-2"><Icon name="award" size={18}/> Bảng thành tích cá nhân</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {sortedHistory.map((h, i) => {
                                const examName = exams.find(e=>e.id===h.examId)?.title || 'Bài tập đã đóng/xóa';
                                const isRecorded = exams.find(e=>e.id===h.examId)?.recordScore !== false;
                                return (
                                <div key={i} className="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                    <div className="flex-1 pr-4">
                                        <p className="font-bold text-sm text-gray-800 line-clamp-1">{examName}</p>
                                        <p className="text-[10px] text-gray-400 font-bold mt-1">{new Date(h.time).toLocaleString('vi-VN')}</p>
                                    </div>
                                    <div className="shrink-0">
                                        {isRecorded ? <span className="text-lg font-black text-red-600 bg-red-50 px-3 py-1 rounded-xl border border-red-100">{h.score}</span> : <span className="text-[10px] font-black text-teal-600 bg-teal-50 px-2 py-1 rounded border border-teal-100 uppercase">Đã làm</span>}
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                );
            };

            if (view === 'folders') return (
                <div className="max-w-6xl mx-auto p-6 md:p-10">
                    {renderHeader("HỆ THỐNG TOÁN THPT")}
                    <h2 className="text-sm uppercase tracking-widest font-black mb-6 text-gray-600 border-l-4 border-blue-900 pl-4">Danh mục Khối Lớp</h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 md:gap-8">
                        {['toan_10', 'toan_11', 'toan_12', 'thqg'].map(cat => {
                            const isAllowed = canAccessFolder(cat);
                            return (
                                <div key={cat} onClick={()=>{
                                    if(isAllowed) { setSelectedCategory(cat); setView('subfolders'); }
                                    else { alert(`Lớp ${studentInfo.class} không được phép truy cập thư mục này!`); }
                                }} className={`card-light p-8 group flex flex-col items-center text-center ${isAllowed ? 'cursor-pointer' : 'card-disabled'}`}>
                                    <div className={`w-20 h-20 rounded-[1.5rem] flex items-center justify-center mb-6 transition-all ${isAllowed ? 'bg-blue-50 text-blue-900 group-hover:bg-blue-900 group-hover:text-white border border-blue-100 group-hover:shadow-lg group-hover:shadow-blue-200' : 'bg-gray-100 text-gray-400 border border-gray-200'}`}><Icon name={cat==='thqg'?'rocket':'book-open'} size={36}/></div>
                                    <h3 className="font-black text-xl uppercase text-gray-800 group-hover:text-blue-900 transition-all">{cat === 'thqg' ? 'Ôn Thi THQG' : cat.replace('_', ' ')}</h3>
                                    {!isAllowed && <span className="text-[10px] mt-4 font-black text-red-600 border border-red-200 px-3 py-1 rounded-lg bg-red-50 uppercase tracking-widest shadow-sm">KHÓA TRUY CẬP</span>}
                                </div>
                            );
                        })}
                    </div>
                    {renderHistoryStats()}
                </div>
            );

            if (view === 'subfolders') {
                if (selectedCategory === 'thqg') {
                    return (
                        <div className="max-w-6xl mx-auto p-6 md:p-10">
                            {renderHeader("ÔN THI THQG", () => setView('folders'))}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mt-10">
                                {[ {id:'ly_thuyet', name:'Lý thuyết', c:'teal', i:'book'}, {id:'on_chu_de', name:'Ôn theo chủ đề', c:'orange', i:'layers'}, {id:'trac_nghiem', name:'Trắc nghiệm từng phần', c:'blue', i:'box'}, {id:'de_tong_on', name:'Đề tổng ôn', c:'red', i:'file-text'} ].map(sub => (
                                    <div key={sub.id} onClick={()=>{
                                        if(sub.id === 'trac_nghiem') { setView('thqg_sub'); } else { setSelectedSub(sub.id); setView('list'); }
                                    }} className="card-light p-8 cursor-pointer group text-center">
                                        <div className={`w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-6 transition-all bg-${sub.c}-50 text-${sub.c}-600 border border-${sub.c}-100 group-hover:bg-${sub.c}-600 group-hover:text-white group-hover:shadow-lg`}><Icon name={sub.i} size={28}/></div>
                                        <h3 className={`font-black text-lg uppercase text-gray-800 group-hover:text-${sub.c}-600 transition-all`}>{sub.name}</h3>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                } else {
                    return (
                        <div className="max-w-6xl mx-auto p-6 md:p-10">
                            {renderHeader(`CHUYÊN MỤC - ${selectedCategory.toUpperCase().replace('_', ' ')}`, () => setView('folders'))}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mt-10">
                                {[ {id:'ly_thuyet', name:'Lý thuyết', c:'teal', i:'book'}, {id:'bai_tap_chuong', name:'Bài tập chương', c:'orange', i:'list'}, {id:'on_dinh_ki', name:'Ôn định kì', c:'blue', i:'calendar'}, {id:'kiem_tra', name:'Bài kiểm tra', c:'red', i:'edit-3'} ].map(sub => (
                                    <div key={sub.id} onClick={()=>{setSelectedSub(sub.id); setView('list');}} className="card-light p-8 cursor-pointer group text-center">
                                        <div className={`w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-6 transition-all bg-${sub.c}-50 text-${sub.c}-600 border border-${sub.c}-100 group-hover:bg-${sub.c}-600 group-hover:text-white group-hover:shadow-lg`}><Icon name={sub.i} size={28}/></div>
                                        <h3 className={`font-black text-lg uppercase text-gray-800 group-hover:text-${sub.c}-600 transition-all`}>{sub.name}</h3>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
            }

            if (view === 'thqg_sub') return (
                <div className="max-w-6xl mx-auto p-6 md:p-10">
                    {renderHeader("TRẮC NGHIỆM TỪNG PHẦN", () => {setSelectedCategory('thqg'); setView('subfolders');})}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 mt-10">
                        {[ {id:'tn_lua_chon', name:'Trắc nghiệm lựa chọn', i:'check-square'}, {id:'tn_dung_sai', name:'Đúng / Sai', i:'toggle-right'}, {id:'tn_ngan', name:'Trả lời ngắn', i:'edit-2'} ].map(sub => (
                            <div key={sub.id} onClick={()=>{setSelectedSub(sub.id); setView('list');}} className="card-light p-8 cursor-pointer group text-center">
                                <div className="w-16 h-16 mx-auto bg-blue-50 border border-blue-100 rounded-2xl flex items-center justify-center text-blue-600 mb-6 transition-all group-hover:bg-blue-600 group-hover:text-white group-hover:shadow-lg"><Icon name={sub.i} size={28}/></div>
                                <h3 className="font-black text-lg uppercase text-gray-800 group-hover:text-blue-600 transition-all">{sub.name}</h3>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'list') {
                let filteredExams = exams.filter(e => e.category === selectedCategory && e.subCategory === selectedSub);

                return (
                    <div className="max-w-6xl mx-auto p-6 md:p-10">
                        {renderHeader("DANH SÁCH BÀI TẬP", () => {
                            if (selectedCategory === 'thqg' && ['tn_lua_chon', 'tn_dung_sai', 'tn_ngan'].includes(selectedSub)) setView('thqg_sub'); else setView('subfolders');
                        })}
                        <div className="flex flex-col gap-6 mt-10">
                            {filteredExams.map(e => {
                                const draftStr = localStorage.getItem(`thmy_draft_${e.id}`); 
                                const hasDraft = e.type === 'pdf' && isDraftNotEmpty(draftStr);
                                const isCompleted = history.some(h => h.examId === e.id);
                                const isLocked = isCompleted && !e.showAnswers;

                                return (
                                <div key={e.id} className={`card-light p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between group gap-6 ${isLocked ? 'card-disabled' : 'cursor-pointer'}`} onClick={()=>{
                                    if(isLocked) { alert('Bài này đã khóa đáp án!'); return; }
                                    startExam(e);
                                }}>
                                    <div className="flex items-center gap-6">
                                        <div className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center border shrink-0 transition-all shadow-sm ${e.type==='pdf'?'bg-red-50 text-red-600 border-red-100 group-hover:bg-red-600':'bg-orange-50 text-orange-600 border-orange-100 group-hover:bg-orange-600'} group-hover:text-white`}><Icon name={e.type==='pdf'?'file-text':'layout'} size={32}/></div>
                                        <div>
                                            <h4 className="font-black text-gray-800 text-lg md:text-xl group-hover:text-blue-600 transition-all line-clamp-1 mb-2">{e.chapter ? `[${e.chapter}] ` : ''}{e.lesson ? `[${e.lesson}] ` : ''}{e.title}</h4>
                                            <div className="flex flex-wrap gap-2 md:gap-3">
                                                <span className="text-[10px] md:text-xs font-black px-3 py-1.5 rounded-lg bg-gray-100 text-gray-500 border border-gray-200 uppercase tracking-widest shadow-sm">FILE {e.type}</span>
                                                <span className="text-[10px] md:text-xs font-black px-3 py-1.5 rounded-lg bg-teal-50 text-teal-600 border border-teal-200 uppercase tracking-widest shadow-sm">{e.recordScore!==false ? 'CÓ TÍNH ĐIỂM' : 'ÔN TẬP TỰ DO'}</span>
                                                {e.config?.timeLimit && <span className="text-[10px] md:text-xs font-black px-3 py-1.5 rounded-lg bg-blue-50 text-blue-600 border border-blue-200 uppercase tracking-widest shadow-sm flex items-center gap-1"><Icon name="clock" size={14}/> {e.config.timeLimit} Phút</span>}
                                                {isLocked ? (
                                                    <span className="text-[10px] md:text-xs font-black px-3 py-1.5 rounded-lg bg-red-50 text-red-600 border border-red-200 uppercase tracking-widest shadow-sm flex items-center gap-1"><Icon name="lock" size={14}/> ĐÃ KHÓA</span>
                                                ) : isCompleted ? (
                                                     <span className="text-[10px] md:text-xs font-black px-3 py-1.5 rounded-lg bg-teal-50 text-teal-600 border border-teal-200 uppercase tracking-widest shadow-sm flex items-center gap-1"><Icon name="check-circle" size={14}/> ĐÃ NỘP</span>
                                                ) : hasDraft ? (
                                                    <span className="text-[10px] md:text-xs font-black px-3 py-1.5 rounded-lg bg-yellow-50 text-yellow-700 border border-yellow-200 uppercase tracking-widest shadow-sm flex items-center gap-1.5"><Icon name="save" size={14}/> Đang làm dở</span>
                                                ) : null}
                                            </div>
                                        </div>
                                    </div>
                                    <button className={`bg-white border-2 px-8 py-4 rounded-2xl text-sm font-black uppercase transition-all self-end md:self-center shrink-0 flex items-center gap-2 shadow-sm ${isLocked ? 'border-red-100 text-red-400 cursor-not-allowed' : 'border-blue-100 text-blue-600 hover:shadow-lg hover:-translate-x-1 group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-600'}`}>
                                        {isLocked ? 'ĐÃ KHÓA' : (isCompleted ? 'XEM LẠI' : 'VÀO LÀM')} <Icon name={isLocked ? 'lock' : 'chevron-right'} size={20}/>
                                    </button>
                                </div>
                            )})}
                            {filteredExams.length === 0 && <div className="text-center py-24 bg-white rounded-[2rem] border border-gray-200 shadow-sm"><div className="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="inbox" size={48} className="text-gray-300"/></div><p className="text-gray-500 text-base font-bold uppercase tracking-widest">Chưa có bài tập nào</p></div>}
                        </div>
                    </div>
                );
            }

            if (view === 'result') return <ResultView attempt={activeExam?.attempt} exam={activeExam} fullData={fullResultData} onBack={() => {setView('list'); setTimeLeft(null);}} />;
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
