<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Hệ Thống Toán THPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F0F4F8; color: #1e293b;}
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDvdEgUXxWvC78Q0xkehC99xMQ-oZGzlus",
            authDomain: "th-my-91ed8.firebaseapp.com",
            projectId: "th-my-91ed8",
            storageBucket: "th-my-91ed8.firebasestorage.app",
            messagingSenderId: "629306856660",
            appId: "1:629306856660:web:4018efbdbd65ad9aed5741"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        const Icon = ({ name, size = 20, className="" }) => {
            const ref = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={`inline-block ${className}`}><i data-lucide={name} style={{width:size, height:size}}></i></span>;
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState('students');
            
            const [dataExams, setDataExams] = useState([]);
            const [dataStudents, setDataStudents] = useState({classes: [], students: []});
            const [dataHistory, setDataHistory] = useState([]);
            
            const [newClass, setNewClass] = useState('');
            const [activeClassTab, setActiveClassTab] = useState('');
            const fileExcelRef = useRef(null);
            
            // Sync states
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('gas_sync_url') || '');
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => {
                const savedLogin = localStorage.getItem('thmy_admin_login');
                if (savedLogin === 'true') { setIsLoggedIn(true); }
            }, []);

            // Fix lỗi lồng listener bằng cách tách bạch các subscriptions
            useEffect(() => {
                if (!isLoggedIn) return;

                const unsubClasses = db.collection("classes").onSnapshot(snap => {
                    const classes = snap.docs.map(doc => doc.id).sort();
                    setDataStudents(prev => ({ ...prev, classes }));
                    if (classes.length > 0 && !activeClassTab) setActiveClassTab(classes[0]);
                });

                const unsubStudents = db.collection("students").onSnapshot(snap => {
                    const students = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setDataStudents(prev => ({ ...prev, students }));
                });

                const unsubExams = db.collection("exams").onSnapshot(snap => {
                    setDataExams(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubHistory = db.collection("history").onSnapshot(snap => {
                    setDataHistory(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { unsubClasses(); unsubStudents(); unsubExams(); unsubHistory(); };
            }, [isLoggedIn]);

            const handleAddClass = async () => {
                if(!newClass) return;
                const className = newClass.toUpperCase().trim();
                await db.collection("classes").doc(className).set({ created: true });
                setNewClass('');
            };

            const handleDeleteClass = async (className) => {
                if(confirm(`Xóa toàn bộ lớp ${className}?`)) {
                    await db.collection("classes").doc(className).delete();
                    const batch = db.batch();
                    const students = dataStudents.students.filter(s => s.class === className);
                    students.forEach(s => batch.delete(db.collection("students").doc(s.id)));
                    await batch.commit();
                    if(activeClassTab === className) setActiveClassTab('');
                }
            };

            const handleAddSingleStudent = async (e) => {
                e.preventDefault();
                if(!activeClassTab) { alert("Vui lòng chọn hoặc tạo lớp trước!"); return; }
                const name = e.target.name.value.trim();
                const studentId = btoa(unescape(encodeURIComponent(name.toLowerCase() + "_" + activeClassTab)));
                await db.collection("students").doc(studentId).set({
                    name, class: activeClassTab, maxDevices: 1, devices: []
                });
                e.target.reset();
            };

            const handleSyncSheets = async () => {
                if (!gasUrl) { alert("https://script.google.com/macros/s/AKfycbxyhvff1gcsE5DVcra1R0Dm1YFwEO6vYMzu_qCUTovWwZaYnLKkIRPxAktD6H0mpyJb/exec"); return; }
                localStorage.setItem('gas_sync_url', gasUrl);
                setIsSyncing(true);
                
                try {
                    const payload = {
                        action: "sync",
                        students: dataStudents.students.map(s => ({
                            id: s.id, name: s.name, class: s.class, maxDevices: s.maxDevices
                        }))
                    };

                    const response = await fetch(gasUrl, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
                    });

                    const result = await response.json();
                    
                    if (result.status === "success") {
                        const batch = db.batch();
                        // Tạo class missing nếu có từ Excel
                        const sheetClasses = [...new Set(result.students.map(s => s.class))];
                        sheetClasses.forEach(c => {
                            if (!dataStudents.classes.includes(c)) {
                                batch.set(db.collection("classes").doc(c), { created: true });
                            }
                        });

                        // Cập nhật lại db Firebase từ Sheets 
                        result.students.forEach(s => {
                            const studentRef = db.collection("students").doc(s.id);
                            batch.set(studentRef, {
                                name: s.name, class: s.class, maxDevices: s.maxDevices, devices: []
                            }, { merge: true });
                        });
                        
                        await batch.commit();
                        alert("Đồng bộ Google Sheets thành công!");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Lỗi đồng bộ. Hãy kiểm tra lại URL và quyền truy cập.");
                } finally {
                    setIsSyncing(false);
                }
            };

            if (!isLoggedIn) return (
                <div className="h-screen flex items-center justify-center bg-slate-100 p-4">
                    <form onSubmit={(e) => {
                        e.preventDefault();
                        if (e.target.u.value === 'thmy' && e.target.p.value === 'Mit123456') {
                            setIsLoggedIn(true); localStorage.setItem('thmy_admin_login', 'true');
                        } else alert("Sai tài khoản!");
                    }} className="glass-panel p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-t border-white">
                        <div className="w-20 h-20 bg-teal-600 rounded-[1.5rem] mx-auto mb-6 flex items-center justify-center text-white shadow-lg"><Icon name="shield-check" size={40}/></div>
                        <h2 className="font-black uppercase mb-8 tracking-tight text-slate-800 text-2xl">BẢNG ĐIỀU KHIỂN</h2>
                        <input name="u" type="text" placeholder="Tên đăng nhập" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-4 outline-none focus:border-teal-500 transition-all font-medium text-sm" required/>
                        <input name="p" type="password" placeholder="Mật khẩu" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-8 outline-none focus:border-teal-500 transition-all font-medium text-sm" required/>
                        <button className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-bold uppercase tracking-wide transition-all shadow-xl hover:shadow-none text-sm">ĐĂNG NHẬP</button>
                    </form>
                </div>
            );

            return (
                <div className="p-4 md:p-8 max-w-[1400px] mx-auto">
                    <header className="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black uppercase tracking-tight text-slate-800">Workspace Quản Trị</h1>
                            <p className="text-teal-600 font-bold text-xs uppercase tracking-widest mt-1">THPT Bùi Thị Xuân - Mũi Né</p>
                        </div>
                        <div className="mt-4 md:mt-0 flex gap-2">
                            <button onClick={()=>{localStorage.removeItem('thmy_admin_login'); setIsLoggedIn(false);}} className="px-4 py-2 bg-rose-50 text-rose-600 rounded-xl font-bold text-xs uppercase flex items-center gap-2 hover:bg-rose-100 transition-colors"><Icon name="log-out" size={16}/> Đăng xuất</button>
                        </div>
                    </header>

                    <div className="flex gap-2 mb-8 bg-white p-2 rounded-2xl shadow-sm border border-slate-100 overflow-x-auto custom-scrollbar">
                        {[{id: 'students', label: 'Quản Lý Học Sinh', icon: 'users'}, {id: 'exams', label: 'Tài Liệu & Đề', icon: 'folder-open'}].map(t => (
                            <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`px-6 py-3 rounded-xl font-bold text-xs uppercase flex items-center gap-2 transition-all whitespace-nowrap ${activeTab===t.id?'bg-teal-600 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}><Icon name={t.icon} size={16}/> {t.label}</button>
                        ))}
                    </div>

                    {activeTab === 'students' && (
                        <div className="flex flex-col lg:flex-row gap-6">
                            <div className="w-full lg:w-80 shrink-0 flex flex-col gap-6">
                                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-xs uppercase text-slate-400 mb-4 flex items-center gap-2"><Icon name="layout-list" size={16}/> Danh sách Lớp</h3>
                                    <div className="space-y-1 mb-4 max-h-[40vh] overflow-y-auto custom-scrollbar pr-2">
                                        {dataStudents.classes.map(c => (
                                            <div key={c} className={`flex items-center justify-between rounded-xl transition-all ${activeClassTab===c?'bg-teal-50 border border-teal-100':'hover:bg-slate-50'}`}>
                                                <button onClick={()=>setActiveClassTab(c)} className={`flex-1 text-left px-4 py-3 font-bold text-sm ${activeClassTab===c?'text-teal-700':'text-slate-600'}`}>{c}</button>
                                                <button onClick={()=>handleDeleteClass(c)} className="p-3 text-rose-400 hover:text-rose-600 transition-colors"><Icon name="trash-2" size={16}/></button>
                                            </div>
                                        ))}
                                        {dataStudents.classes.length === 0 && <div className="text-xs text-slate-400 italic text-center py-4">Chưa có lớp nào</div>}
                                    </div>
                                    <div className="pt-4 border-t border-slate-100 flex gap-2">
                                        <input type="text" placeholder="Nhập tên lớp mới..." value={newClass} onChange={e=>setNewClass(e.target.value)} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold uppercase outline-none focus:border-teal-500 transition-all" />
                                        <button onClick={handleAddClass} className="bg-slate-800 hover:bg-slate-900 text-white p-3 rounded-xl font-black transition-colors"><Icon name="plus" size={18}/></button>
                                    </div>
                                </div>

                                <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-xs uppercase text-slate-400 mb-4 flex items-center gap-2"><Icon name="refresh-cw" size={16}/> Đồng Bộ Google Sheets</h3>
                                    <input type="text" placeholder="Dán Web App URL vào đây..." value={gasUrl} onChange={e=>setGasUrl(e.target.value)} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-xs font-medium outline-none focus:border-teal-500 transition-all mb-3" />
                                    <button onClick={handleSyncSheets} disabled={isSyncing} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold uppercase text-xs shadow-md transition-all flex items-center justify-center gap-2">
                                        {isSyncing ? <Icon name="loader" className="animate-spin" size={16}/> : <Icon name="upload-cloud" size={16}/>}
                                        {isSyncing ? 'Đang đồng bộ...' : 'Bắt đầu đồng bộ'}
                                    </button>
                                </div>
                            </div>

                            <div className="flex-1 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm min-h-[60vh]">
                                {activeClassTab ? (
                                    <>
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
                                            <h2 className="text-xl font-black text-slate-800 flex items-center gap-2">
                                                <div className="w-8 h-8 rounded-lg bg-teal-100 text-teal-600 flex items-center justify-center"><Icon name="users" size={18}/></div>
                                                LỚP {activeClassTab}
                                            </h2>
                                            <form onSubmit={handleAddSingleStudent} className="flex gap-2 w-full sm:w-auto">
                                                <input name="name" type="text" placeholder="Nhập tên học sinh..." className="bg-slate-50 border border-slate-200 px-4 py-2.5 rounded-xl text-sm font-bold flex-1 sm:w-64 outline-none focus:border-teal-500 transition-all" required/>
                                                <button className="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all">Thêm</button>
                                            </form>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead>
                                                    <tr className="text-[11px] font-black text-slate-400 uppercase border-b border-slate-100">
                                                        <th className="pb-4 pl-2">Họ và Tên</th>
                                                        <th className="pb-4 text-center">Thiết bị tối đa</th>
                                                        <th className="pb-4 text-right pr-2">Hành động</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {dataStudents.students.filter(s=>s.class===activeClassTab).map((s, index) => (
                                                        <tr key={s.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                            <td className="py-4 pl-2 font-bold text-slate-700 text-sm flex items-center gap-3">
                                                                <span className="w-6 h-6 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center text-[10px]">{index+1}</span>
                                                                {s.name}
                                                            </td>
                                                            <td className="py-4 text-center">
                                                                <div className="flex items-center justify-center gap-3">
                                                                    <button onClick={()=>db.collection("students").doc(s.id).update({maxDevices: Math.max(1, s.maxDevices - 1)})} className="w-7 h-7 bg-white border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-100 font-black transition-colors">-</button>
                                                                    <span className="font-black text-teal-600 w-4">{s.maxDevices}</span>
                                                                    <button onClick={()=>db.collection("students").doc(s.id).update({maxDevices: s.maxDevices + 1})} className="w-7 h-7 bg-white border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-100 font-black transition-colors">+</button>
                                                                </div>
                                                            </td>
                                                            <td className="py-4 text-right pr-2">
                                                                <button onClick={()=>db.collection("students").doc(s.id).update({devices: []})} className="text-[11px] bg-amber-50 text-amber-600 px-3 py-2 rounded-lg font-bold mr-2 hover:bg-amber-100 transition-colors">Reset ID</button>
                                                                <button onClick={()=>db.collection("students").doc(s.id).delete()} className="text-[11px] bg-rose-50 text-rose-600 p-2 rounded-lg hover:bg-rose-100 transition-colors"><Icon name="trash-2" size={16}/></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {dataStudents.students.filter(s=>s.class===activeClassTab).length === 0 && (
                                                        <tr><td colSpan="3" className="text-center py-8 text-slate-400 text-sm font-medium">Chưa có học sinh nào trong lớp này.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                                        <Icon name="users" size={64} className="mb-4 opacity-50"/>
                                        <p className="font-bold text-sm">Chọn một lớp bên trái để quản lý</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {activeTab === 'exams' && (
                        <div className="bg-white p-10 rounded-3xl text-center border border-slate-100 shadow-sm text-slate-400 py-32 font-medium">
                            <Icon name="hammer" size={48} className="mx-auto mb-4 opacity-50" />
                            Giao diện quản lý tài liệu có thể tái sử dụng từ code gốc của Thầy hoặc nâng cấp sau. <br/> Trọng tâm nâng cấp bản này tập trung vào xử lý Triệt Để lỗi Học Sinh & Google Sheets.
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
